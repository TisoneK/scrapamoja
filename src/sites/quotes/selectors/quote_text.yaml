id: quote_text
name: Quote Text
selector_type: hybrid
description: "The quotation text inside a quote block"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3
strategies:
  - type: "css"
    selector: ".text"
    weight: 1.0
  - type: "css"
    selector: "span.text"
    weight: 0.9
  - type: "xpath"
    selector: "//span[@class='text']"
    weight: 0.7
metadata:
  volatile_selectors: []
  stable_selectors: [".text"]
