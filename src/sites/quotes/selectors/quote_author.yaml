id: quote_author
name: Quote Author
selector_type: hybrid
description: "The author name inside a quote block"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3
strategies:
  - type: "css"
    selector: ".author"
    weight: 1.0
  - type: "css"
    selector: "small.author"
    weight: 0.9
  - type: "xpath"
    selector: "//small[@class='author']"
    weight: 0.7
metadata:
  volatile_selectors: []
  stable_selectors: [".author"]
