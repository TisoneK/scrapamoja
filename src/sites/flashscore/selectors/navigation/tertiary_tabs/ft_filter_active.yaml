id: ft_filter_active
name: FT Filter Active
selector_type: css
description: "Active state indicator for the FT (Full Time) statistical filter"
confidence_threshold: 0.9
timeout: 3.0
retry_count: 2

strategies:
  - type: "css"
    selector: '.statsFilter[data-filter="ft"].active'
    weight: 1.0
  - type: "css"
    selector: '.filter__item[data-name="ft"].selected'
    weight: 0.9
  - type: "css"
    selector: '.stats__filter[href*="ft"].active'
    weight: 0.85
  - type: "css"
    selector: '[data-stats-filter="ft"].active'
    weight: 0.8
  - type: "css"
    selector: '.statsContent[data-filter="ft"]'
    weight: 0.7
  - type: "css"
    selector: '[data-content="ft"]'
    weight: 0.65
  - type: "xpath"
    selector: "//*[@data-stats-filter='ft' and contains(@class, 'active')]"
    weight: 0.5

metadata:
  wait_for_element: false
  tab_context: "stats"
  tertiary_context: "ft"
  volatile_selectors:
    - '.statsFilter[data-filter="ft"].active'
    - '.filter__item[data-name="ft"].selected'
    - '.stats__filter[href*="ft"].active'
    - '.ft__content'
  stable_selectors:
    - '[data-stats-filter="ft"].active'
    - '.statsContent[data-filter="ft"]'
    - '[data-content="ft"]'
