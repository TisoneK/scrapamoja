id: stats_filter_container
name: Stats Filter Container
selector_type: css
description: "Container element holding all statistical filter buttons (Inc OT, FT, Q1)"
confidence_threshold: 0.9
timeout: 3.0
retry_count: 2

strategies:
  - type: "css"
    selector: ".statsFilters"
    weight: 1.0
  - type: "css"
    selector: ".filterContainer"
    weight: 0.9
  - type: "css"
    selector: "[data-testid='stats-filters']"
    weight: 0.8
  - type: "css"
    selector: "[class*='statsFilter']"
    weight: 0.7
  - type: "xpath"
    selector: "//div[contains(@class, 'statsFilters') or contains(@class, 'filterContainer')]"
    weight: 0.6

metadata:
  wait_for_element: true
  required_for_navigation: true
  tab_context: "stats"
  volatile_selectors:
    - ".statsFilters"
    - ".filterContainer"
  stable_selectors:
    - "[data-testid='stats-filters']"
