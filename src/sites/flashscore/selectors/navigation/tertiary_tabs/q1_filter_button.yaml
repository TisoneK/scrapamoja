id: q1_filter_button
name: Q1 Filter Button
selector_type: css
description: "Q1 (First Quarter) statistical filter navigation button"
confidence_threshold: 0.9
timeout: 3.0
retry_count: 2

strategies:
  - type: "css"
    selector: '.statsFilter[data-filter="q1"]'
    weight: 1.0
  - type: "css"
    selector: '.filter__item[data-name="q1"]'
    weight: 0.9
  - type: "css"
    selector: '[data-stats-filter="q1"]'
    weight: 0.85
  - type: "css"
    selector: '.stats__filter[href*="q1"]'
    weight: 0.8
  - type: "css"
    selector: "[data-subtab='q1']"
    weight: 0.75
  - type: "css"
    selector: ".subtab-q1"
    weight: 0.7
  - type: "xpath"
    selector: "//a[contains(text(), 'Q1') or contains(text(), '1st Quarter')]"
    weight: 0.6

metadata:
  wait_for_element: true
  required_for_navigation: false
  tab_context: "stats"
  tertiary_context: "q1"
  volatile_selectors:
    - '.statsFilter[data-filter="q1"]'
    - '.filter__item[data-name="q1"]'
    - ".subtab-q1"
  stable_selectors:
    - '[data-stats-filter="q1"]'
    - "[data-subtab='q1']"
