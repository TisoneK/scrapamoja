id: prematch_score
name: Pre-Match Score
selector_type: css
description: "Score elements in pre-match/scheduled state within a match listing row"
confidence_threshold: 0.8
timeout: 5.0
retry_count: 3
strategies:
  - type: "css"
    selector: ".event__score[data-state='pre-match']"
    weight: 1.0
  - type: "css"
    selector: "[data-state='pre-match']"
    weight: 0.9
  - type: "xpath"
    selector: "//span[contains(@class, 'event__score') and @data-state='pre-match']"
    weight: 0.7
  - type: "css"
    selector: "[data-testid='score-prematch']"
    weight: 0.5
metadata:
  wait_for_element: false
  volatile_selectors: [".event__score[data-state='pre-match']"]
  stable_selectors: ["[data-state='pre-match']", "[data-testid='score-prematch']"]
  dom_state: "scheduled"
