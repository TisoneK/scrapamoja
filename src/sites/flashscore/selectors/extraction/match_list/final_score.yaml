id: final_score
name: Final Score
selector_type: css
description: "Score elements in final/finished state within a match listing row"
confidence_threshold: 0.8
timeout: 5.0
retry_count: 3
strategies:
  - type: "css"
    selector: ".event__score[data-state='final']"
    weight: 1.0
  - type: "css"
    selector: "[data-state='final']"
    weight: 0.9
  - type: "xpath"
    selector: "//span[contains(@class, 'event__score') and @data-state='final']"
    weight: 0.7
  - type: "css"
    selector: "[data-testid='score-final']"
    weight: 0.5
metadata:
  wait_for_element: false
  volatile_selectors: [".event__score[data-state='final']"]
  stable_selectors: ["[data-state='final']", "[data-testid='score-final']"]
  dom_state: "finished"
