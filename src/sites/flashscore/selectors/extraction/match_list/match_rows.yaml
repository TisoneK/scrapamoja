id: match_rows
name: Match Rows (Loaded Content)
selector_type: css
description: "Non-skeleton match row elements — used to wait for content to finish loading. Skeleton placeholders are excluded so we can tell the page has real data."
confidence_threshold: 0.8
timeout: 10.0
retry_count: 3
strategies:
  - type: "css"
    selector: ".event__match:not([class*='skeleton'])"
    weight: 1.0
  - type: "css"
    selector: ".event__match:not(.event__match--skeleton)"
    weight: 0.9
  - type: "css"
    selector: ".event__match"
    weight: 0.7
  - type: "xpath"
    selector: "//div[contains(@class, 'event__match') and not(contains(@class, 'skeleton'))]"
    weight: 0.6
metadata:
  wait_for_element: true
  volatile_selectors: [".event__match:not([class*='skeleton'])"]
  stable_selectors: []
