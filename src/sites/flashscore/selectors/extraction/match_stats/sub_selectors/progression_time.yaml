id: progression_time
name: Progression Time
selector_type: css
description: "Time marker within a scoring progression entry"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: "[data-testid='progression-time']"
    weight: 1.0
  # Strategy 2: Semantic class
  - type: "css"
    selector: ".progressionTime"
    weight: 0.9
  # Strategy 3: Partial class match
  - type: "css"
    selector: "[class*='progressionTime']"
    weight: 0.7
  # Strategy 4: CSS with nested span
  - type: "css"
    selector: ".progressionTime > span"
    weight: 0.65
  # Strategy 5: XPath fallback
  - type: "xpath"
    selector: "//*[@data-testid='progression-time']"
    weight: 0.6
  - type: "xpath"
    selector: ".//*[contains(@class, 'progressionTime')]"
    weight: 0.5

metadata:
  wait_for_element: false
  tab_context: "stats"
  tertiary_context: "ft"
  parent_selector: "[data-testid='wcl-statistics']"
  volatile_selectors:
    - ".progressionTime"
  stable_selectors:
    - "[data-testid='progression-time']"
