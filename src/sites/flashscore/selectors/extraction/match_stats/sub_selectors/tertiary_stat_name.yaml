id: tertiary_stat_name
name: Tertiary Stat Name
selector_type: css
description: "Stat name/label within a tertiary filter stat row (e.g., field goals, rebounds)"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: "[data-testid='wcl-statistics-category'] > span"
    weight: 1.0
  # Strategy 2: data-testid without child span
  - type: "css"
    selector: "[data-testid='wcl-statistics-category']"
    weight: 0.95
  # Strategy 3: Tertiary-specific class
  - type: "css"
    selector: ".statName"
    weight: 0.9
  # Strategy 4: Obfuscated class (volatile)
  - type: "css"
    selector: ".wcl-category_6sT1J > span"
    weight: 0.85
  # Strategy 5: Partial class match
  - type: "css"
    selector: "[class*='statName']"
    weight: 0.7
  # Strategy 6: XPath fallback
  - type: "xpath"
    selector: ".//*[@data-testid='wcl-statistics-category']/span"
    weight: 0.6

metadata:
  wait_for_element: false
  tab_context: "stats"
  parent_selector: "[data-testid='wcl-statistics']"
  volatile_selectors:
    - ".statName"
    - ".wcl-category_6sT1J"
  stable_selectors:
    - "[data-testid='wcl-statistics-category']"
