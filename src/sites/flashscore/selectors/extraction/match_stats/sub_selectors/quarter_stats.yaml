id: quarter_stats
name: Quarter Stats
selector_type: css
description: "Quarter statistics content within a quarter breakdown row"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: "[data-testid='quarter-stats']"
    weight: 1.0
  # Strategy 2: Semantic class
  - type: "css"
    selector: ".quarterStats"
    weight: 0.9
  # Strategy 3: Partial class match
  - type: "css"
    selector: "[class*='quarterStats']"
    weight: 0.7
  # Strategy 4: CSS with nested span
  - type: "css"
    selector: ".quarterStats > span"
    weight: 0.65
  # Strategy 5: XPath fallback
  - type: "xpath"
    selector: "//*[@data-testid='quarter-stats']"
    weight: 0.6
  - type: "xpath"
    selector: ".//*[contains(@class, 'quarterStats')]"
    weight: 0.5

metadata:
  wait_for_element: false
  tab_context: "stats"
  tertiary_context: "q1"
  parent_selector: "[data-testid='wcl-statistics']"
  volatile_selectors:
    - ".quarterStats"
  stable_selectors:
    - "[data-testid='quarter-stats']"
