id: tertiary_stat_away_value
name: Tertiary Stat Away Value
selector_type: css
description: "Away team value within a tertiary filter stat row"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: ".wcl-awayValue_Y-QR1 [data-testid='wcl-statistics-value'] > span"
    weight: 1.0
  # Strategy 2: data-testid without child span
  - type: "css"
    selector: ".wcl-awayValue_Y-QR1 [data-testid='wcl-statistics-value']"
    weight: 0.95
  # Strategy 3: Tertiary-specific class
  - type: "css"
    selector: ".statValue--away"
    weight: 0.9
  # Strategy 4: Obfuscated class
  - type: "css"
    selector: ".wcl-awayValue_Y-QR1 > span"
    weight: 0.85
  # Strategy 5: Partial class matches
  - type: "css"
    selector: "[class*='awayValue'] > span"
    weight: 0.7
  - type: "css"
    selector: "[class*='awayValue']"
    weight: 0.6
  # Strategy 6: XPath fallback
  - type: "xpath"
    selector: ".//*[@data-testid='wcl-statistics-value']/span"
    weight: 0.5

metadata:
  wait_for_element: false
  tab_context: "stats"
  parent_selector: "[data-testid='wcl-statistics']"
  volatile_selectors:
    - ".statValue--away"
    - ".wcl-awayValue_Y-QR1"
  stable_selectors:
    - "[data-testid='wcl-statistics-value']"
