id: total_name
name: Total Name
selector_type: css
description: "Name/label within a total statistics row"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: "[data-testid='total-name']"
    weight: 1.0
  # Strategy 2: Semantic class
  - type: "css"
    selector: ".totalName"
    weight: 0.9
  # Strategy 3: Partial class match
  - type: "css"
    selector: "[class*='totalName']"
    weight: 0.7
  # Strategy 4: CSS with nested span
  - type: "css"
    selector: ".totalName > span"
    weight: 0.65
  # Strategy 5: XPath fallback
  - type: "xpath"
    selector: "//*[@data-testid='total-name']"
    weight: 0.6
  - type: "xpath"
    selector: ".//*[contains(@class, 'totalName')]"
    weight: 0.5

metadata:
  wait_for_element: false
  tab_context: "stats"
  parent_selector: "[data-testid='wcl-statistics']"
  volatile_selectors:
    - ".totalName"
  stable_selectors:
    - "[data-testid='total-name']"
