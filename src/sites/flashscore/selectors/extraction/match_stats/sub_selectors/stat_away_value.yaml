id: stat_away_value
name: Stat Away Value
selector_type: css
description: "Away team value within a stat row"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  - type: "css"
    selector: ".wcl-awayValue_Y-QR1 [data-testid='wcl-statistics-value'] > span"
    weight: 1.0
  - type: "css"
    selector: ".wcl-awayValue_Y-QR1 [data-testid='wcl-statistics-value']"
    weight: 0.95
  - type: "css"
    selector: ".wcl-awayValue_Y-QR1 > span"
    weight: 0.9
  - type: "css"
    selector: ".wcl-awayValue_Y-QR1"
    weight: 0.85
  - type: "css"
    selector: "[class*='awayValue'] > span"
    weight: 0.7
  - type: "css"
    selector: "[class*='awayValue']"
    weight: 0.6
  - type: "xpath"
    selector: ".//*[@data-testid='wcl-statistics-value']/span"
    weight: 0.5

metadata:
  wait_for_element: false
  tab_context: "stats"
  parent_selector: "[data-testid='wcl-statistics']"
  volatile_selectors:
    - ".wcl-awayValue_Y-QR1"
  stable_selectors:
    - "[data-testid='wcl-statistics-value']"
