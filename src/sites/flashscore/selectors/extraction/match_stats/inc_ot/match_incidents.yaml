id: match_incidents
name: Match Incidents
selector_type: css
description: "Match incidents in stats view (basketball)"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  - type: "css"
    selector: "[data-testid='wcl-statistics']"
    weight: 1.0
  - type: "css"
    selector: ".wcl-row_2oCpS"
    weight: 0.9
  - type: "css"
    selector: "[class*='wcl-row']"
    weight: 0.8
  - type: "xpath"
    selector: "//div[@data-testid='wcl-statistics']"
    weight: 0.6

metadata:
  wait_for_element: true
  tab_context: "stats"
  tertiary_context: "inc_ot"
  volatile_selectors:
    - ".wcl-row_2oCpS"
  stable_selectors:
    - "[data-testid='wcl-statistics']"
