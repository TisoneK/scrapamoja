id: total_stat_inc_ot
name: Total Stat Inc OT
selector_type: css
description: "Total statistics row within Including Overtime filter (basketball)"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: "[data-testid='total-stat-inc-ot']"
    weight: 1.0
  # Strategy 2: Tertiary-specific class
  - type: "css"
    selector: ".totalStat--inc-ot"
    weight: 0.9
  # Strategy 3: Partial class match
  - type: "css"
    selector: "[class*='totalStat--inc-ot']"
    weight: 0.7
  # Strategy 4: Generic total with data attribute
  - type: "css"
    selector: ".totalStat[data-filter='inc_ot']"
    weight: 0.65
  # Strategy 5: XPath fallback
  - type: "xpath"
    selector: "//*[@data-testid='total-stat-inc-ot']"
    weight: 0.6
  - type: "xpath"
    selector: ".//*[contains(@class, 'totalStat--inc-ot')]"
    weight: 0.5

metadata:
  wait_for_element: true
  tab_context: "stats"
  tertiary_context: "inc_ot"
  volatile_selectors:
    - ".totalStat--inc-ot"
  stable_selectors:
    - "[data-testid='total-stat-inc-ot']"
