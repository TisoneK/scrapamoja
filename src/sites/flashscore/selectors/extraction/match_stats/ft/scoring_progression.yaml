id: scoring_progression
name: Scoring Progression
selector_type: css
description: "Scoring progression entries within Full Time filter (basketball)"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: "[data-testid='scoring-progression']"
    weight: 1.0
  # Strategy 2: Semantic class
  - type: "css"
    selector: ".scoringProgression"
    weight: 0.9
  # Strategy 3: Partial class match
  - type: "css"
    selector: "[class*='scoringProgression']"
    weight: 0.7
  # Strategy 4: Data attribute approach
  - type: "css"
    selector: "[data-type='scoring-progression']"
    weight: 0.65
  # Strategy 5: XPath fallback
  - type: "xpath"
    selector: "//*[@data-testid='scoring-progression']"
    weight: 0.6
  - type: "xpath"
    selector: ".//*[contains(@class, 'scoringProgression')]"
    weight: 0.5

metadata:
  wait_for_element: true
  tab_context: "stats"
  tertiary_context: "ft"
  volatile_selectors:
    - ".scoringProgression"
  stable_selectors:
    - "[data-testid='scoring-progression']"
