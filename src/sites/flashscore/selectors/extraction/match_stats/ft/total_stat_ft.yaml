id: total_stat_ft
name: Total Stat FT
selector_type: css
description: "Total statistics row within Full Time filter (basketball)"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: "[data-testid='total-stat-ft']"
    weight: 1.0
  # Strategy 2: Tertiary-specific class
  - type: "css"
    selector: ".totalStat--ft"
    weight: 0.9
  # Strategy 3: Partial class match
  - type: "css"
    selector: "[class*='totalStat--ft']"
    weight: 0.7
  # Strategy 4: Generic total with data attribute
  - type: "css"
    selector: ".totalStat[data-filter='ft']"
    weight: 0.65
  # Strategy 5: XPath fallback
  - type: "xpath"
    selector: "//*[@data-testid='total-stat-ft']"
    weight: 0.6
  - type: "xpath"
    selector: ".//*[contains(@class, 'totalStat--ft')]"
    weight: 0.5

metadata:
  wait_for_element: true
  tab_context: "stats"
  tertiary_context: "ft"
  volatile_selectors:
    - ".totalStat--ft"
  stable_selectors:
    - "[data-testid='total-stat-ft']"
