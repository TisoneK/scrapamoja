id: quarter3_stats
name: Quarter 3 Stats
selector_type: css
description: "Third quarter statistics"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  # Strategy 1: data-testid — most stable
  - type: "css"
    selector: "[data-testid='wcl-statistics']"
    weight: 1.0
  # Strategy 2: Obfuscated class (current hash) — volatile
  - type: "css"
    selector: ".wcl-row_2oCpS"
    weight: 0.9
  # Strategy 3: Partial class match
  - type: "css"
    selector: "[class*='wcl-row']"
    weight: 0.8
  # Strategy 4: XPath fallback
  - type: "xpath"
    selector: "//div[@data-testid='wcl-statistics']"
    weight: 0.6

metadata:
  wait_for_element: true
  tab_context: "stats"
  tertiary_context: "q3"
  navigation:
    primary_tab: "Match"
    secondary_tab: "Stats"
    period_filter: "3rd Quarter"
  volatile_selectors:
    - ".wcl-row_2oCpS"
  stable_selectors:
    - "[data-testid='wcl-statistics']"
