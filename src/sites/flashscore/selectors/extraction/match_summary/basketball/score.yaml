id: score
name: Score
selector_type: css
description: "Match score on detail page"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  - type: "css"
    selector: ".smh__score.smh__home"
    weight: 1.0
  - type: "css"
    selector: ".smh__home"
    weight: 0.9
  - type: "css"
    selector: "[class*='smh__score']"
    weight: 0.8
  - type: "xpath"
    selector: "//*[contains(@class, 'smh__score')]"
    weight: 0.7

metadata:
  wait_for_element: true
  tab_context: "summary"
  notes: "Two score elements: .smh__score.smh__home and .smh__score.smh__away"
