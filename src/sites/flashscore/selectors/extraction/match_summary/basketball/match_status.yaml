id: match_status
name: Match Status
selector_type: css
description: "Match status indicator (Finished, Live, etc.)"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  - type: "css"
    selector: ".fixedHeaderDuel__detailStatus"
    weight: 1.0
  - type: "css"
    selector: "[class*='detailStatus']"
    weight: 0.8
  - type: "xpath"
    selector: "//*[contains(@class, 'detailStatus')]"
    weight: 0.7

metadata:
  wait_for_element: false
  tab_context: "summary"
