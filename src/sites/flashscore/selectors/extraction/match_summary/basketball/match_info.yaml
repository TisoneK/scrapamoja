id: match_info
name: Match Info
selector_type: css
description: "Match date/time on detail page"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  - type: "css"
    selector: ".duelParticipant__startTime"
    weight: 1.0
  - type: "css"
    selector: "[class*='startTime']"
    weight: 0.8
  - type: "xpath"
    selector: "//*[contains(@class, 'startTime')]"
    weight: 0.7

metadata:
  wait_for_element: true
  tab_context: "summary"
