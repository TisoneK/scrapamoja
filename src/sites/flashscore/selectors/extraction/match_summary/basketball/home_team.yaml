id: home_team
name: Home Team
selector_type: css
description: "Home team name on match detail page"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  - type: "css"
    selector: ".duelParticipant__home .participant__participantNameWrapper"
    weight: 1.0
  - type: "css"
    selector: ".duelParticipant__home"
    weight: 0.9
  - type: "css"
    selector: "[class*='duelParticipant__home']"
    weight: 0.8
  - type: "xpath"
    selector: "//*[contains(@class, 'duelParticipant__home')]"
    weight: 0.7
  - type: "css"
    selector: "[data-testid='home-team']"
    weight: 0.5

metadata:
  wait_for_element: true
  tab_context: "summary"
  stable_selectors:
    - ".duelParticipant__home"
