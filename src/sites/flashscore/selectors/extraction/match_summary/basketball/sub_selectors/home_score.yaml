id: home_score
name: Home Score
selector_type: css
description: "Home team score element on match detail page"
confidence_threshold: 0.7
timeout: 5.0
retry_count: 3

strategies:
  # Strategy 1: Specific score+home class combo — most stable
  - type: "css"
    selector: ".smh__score.smh__home"
    weight: 1.0
  # Strategy 2: Home score container only — volatile obfuscated class
  - type: "css"
    selector: ".smh__home"
    weight: 0.9
  # Strategy 3: Partial class match for score+home — survives hash changes
  - type: "css"
    selector: "[class*='smh__score'][class*='home']"
    weight: 0.8
  # Strategy 4: XPath fallback — last resort
  - type: "xpath"
    selector: "//*[contains(@class, 'smh__score') and contains(@class, 'smh__home')]"
    weight: 0.6

metadata:
  wait_for_element: true
  tab_context: "summary"
  volatile_selectors:
    - ".smh__home"
  stable_selectors:
    - "[class*='smh__score'][class*='home']"
