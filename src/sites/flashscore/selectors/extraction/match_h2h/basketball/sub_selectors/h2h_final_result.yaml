id: h2h_final_result
name: H2H Final Result
selector_type: css
description: "Final result container in H2H row (includes OT if applicable)"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  # Strategy 1: Final result class — most specific
  - type: "css"
    selector: ".h2h__result--final"
    weight: 1.0
  # Strategy 2: Partial class match for h2h__result — broader but stable
  - type: "css"
    selector: "[class*='h2h__result']"
    weight: 0.8
  # Strategy 3: XPath fallback — last resort
  - type: "xpath"
    selector: "//*[contains(@class, 'h2h__result--final')]"
    weight: 0.6

metadata:
  wait_for_element: false
  tab_context: "h2h"
  parent_selector: ".h2h__row"
  volatile_selectors:
    - ".h2h__result--final"
  stable_selectors:
    - "[class*='h2h__result']"
