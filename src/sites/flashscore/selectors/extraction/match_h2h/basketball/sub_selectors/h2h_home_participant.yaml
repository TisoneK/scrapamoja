id: h2h_home_participant
name: H2H Home Participant
selector_type: css
description: "Home participant container element in H2H row"
confidence_threshold: 0.7
timeout: 3.0
retry_count: 2

strategies:
  # Strategy 1: Home participant class — most specific
  - type: "css"
    selector: ".h2h__homeParticipant"
    weight: 1.0
  # Strategy 2: Partial class match — survives hash rotation
  - type: "css"
    selector: "[class*='homeParticipant']"
    weight: 0.8
  # Strategy 3: XPath fallback — last resort
  - type: "xpath"
    selector: "//*[contains(@class, 'homeParticipant')]"
    weight: 0.6

metadata:
  wait_for_element: false
  tab_context: "h2h"
  parent_selector: ".h2h__row"
  volatile_selectors:
    - ".h2h__homeParticipant"
  stable_selectors:
    - "[class*='homeParticipant']"
