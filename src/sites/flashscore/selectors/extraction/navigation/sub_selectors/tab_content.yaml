    selector: "[class*='tabContent']"
    weight: 0.7
  - type: "xpath"
    selector: "//*[@data-testid='tab-content']"
    weight: 0.6

metadata:
  wait_for_element: false
  notes: "Used for verifying tab content visibility after navigation"
