id: match_items
name: Match Items
selector_type: css
description: "All match row elements on the page (.event__match) regardless of status. Use scheduled_match_class / live_match_class / finished_match_class for status-specific filtering."
confidence_threshold: 0.8
timeout: 5.0
retry_count: 2
strategies:
  - type: "css"
    selector: ".event__match"
    weight: 1.0
  - type: "css"
    selector: "[class*='event__match']"
    weight: 0.9
  - type: "css"
    selector: ".container__liveTableWrapper .event__match"
    weight: 0.8
  - type: "xpath"
    selector: "//div[contains(@class, 'event__match')]"
    weight: 0.7
metadata:
  wait_for_element: true
  required_for_navigation: true
